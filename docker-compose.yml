version: '3.8'

services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: libretranslate
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=en,ko,bn,vi,si
      - LT_UPDATE_MODELS=true
      - LT_API_KEYS=false
      - LT_HOST=0.0.0.0
    volumes:
      - libretranslate_models:/home/libretranslate/.local/share/argos-translate/packages
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  chat-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gt-crm-chat
    ports:
      - "3000:3000"
    environment:
      - LIBRETRANSLATE_URL=http://libretranslate:5000
      - DEFAULT_TRANSLATION_ENGINE=libretranslate
    depends_on:
      libretranslate:
        condition: service_healthy
    restart: unless-stopped

volumes:
  libretranslate_models: